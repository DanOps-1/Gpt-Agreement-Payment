<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <title>Gpt-Agreement-Payment logo</title>
  <desc>Outer circle = Solver field of view; Inner diagonal tiles = Solver locked target; Vertical | = Protocol stack layering; Horizontal → = Protocol replay traversal</desc>

  <!-- Outer circle / lens -->
  <circle cx="128" cy="128" r="100" stroke="#1f2328" stroke-width="8"/>

  <!-- Protocol stack layering (thin vertical line, semi-transparent, as background) -->
  <line x1="128" y1="36" x2="128" y2="220" stroke="#1f2328" stroke-width="3" opacity="0.35"/>

  <!-- Two diagonal tile highlights -->
  <rect x="78" y="78" width="42" height="42" fill="#1f2328" fill-opacity="0.18"/>
  <rect x="136" y="136" width="42" height="42" fill="#1f2328" fill-opacity="0.18"/>
  <rect x="78" y="78" width="42" height="42" stroke="#1f2328" stroke-width="2.5"/>
  <rect x="136" y="136" width="42" height="42" stroke="#1f2328" stroke-width="2.5"/>

  <!-- Protocol replay arrow → horizontal traversal -->
  <g stroke="#1f2328" stroke-width="8">
    <line x1="60" y1="128" x2="186" y2="128"/>
    <polyline points="170,112 188,128 170,144" fill="none"/>
  </g>
</svg>
